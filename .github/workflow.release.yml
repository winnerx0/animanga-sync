name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests
        run: bun test

      - name: Run build
        run: bun build --compile --outfile animanga-sync src/index.ts --minify

      - name: Create release
        uses: ncipollo/release-action@v1
        with:
           artifacts: animanga-sync
           token: ${{ secrets.GITHUB_TOKEN }}
           generateReleaseNotes: true